name: Bot 001 - Informe General TMS Diario

on:
  schedule:
    # Corre a las 8:00 AM UTC = 3:00 AM hora Colombia (UTC-5)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  descargar-informe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Instalar dependencias
        run: |
          pip install selenium psycopg2-binary pandas

      - name: Crear extensión Chrome para proxy auth
        run: |
          mkdir -p /tmp/proxy_auth
          cat > /tmp/proxy_auth/manifest.json << 'EOF'
          {
            "version": "1.0.0",
            "manifest_version": 2,
            "name": "Proxy Auth",
            "permissions": ["proxy", "tabs", "unlimitedStorage", "storage", "webRequest", "webRequestBlocking"],
            "background": {
              "scripts": ["background.js"]
            },
            "minimum_chrome_version": "49.0"
          }
          EOF
          cat > /tmp/proxy_auth/background.js << 'EOF'
          var config = {
            mode: "fixed_servers",
            rules: {
              singleProxy: {
                scheme: "http",
                host: "${{ secrets.PROXY_HOST }}",
                port: parseInt("${{ secrets.PROXY_PORT }}")
              },
              bypassList: ["foobar.com"]
            }
          };
          chrome.proxy.settings.set({value: config, scope: "regular"}, function() {});
          chrome.webRequest.onAuthRequired.addListener(
            function(details) {
              return {authCredentials: {username: "${{ secrets.PROXY_USER }}", password: "${{ secrets.PROXY_PASS }}"}};
            },
            {urls: ["<all_urls>"]},
            ["blocking"]
          );
          EOF

      - name: Diagnosticar proxy
        run: |
          echo "=== Diagnostico de Proxy ==="
          PROXY_HOST="${{ secrets.PROXY_HOST }}"
          PROXY_PORT="${{ secrets.PROXY_PORT }}"
          echo "PROXY_HOST length: ${#PROXY_HOST}"
          echo "PROXY_HOST first 4 chars: ${PROXY_HOST:0:4}"
          echo "PROXY_HOST last 4 chars: ${PROXY_HOST: -4}"
          echo "PROXY_PORT: ${{ secrets.PROXY_PORT }}"
          echo "PROXY_HOST is empty: $([ -z "$PROXY_HOST" ] && echo 'YES - EMPTY!' || echo 'No')"

          # Validar que PROXY_HOST no este vacio
          if [ -z "$PROXY_HOST" ]; then
            echo "ERROR: PROXY_HOST esta vacio. Deteniendo workflow."
            exit 1
          fi

          echo ""
          echo "=== Probando conexion al puerto del proxy ==="
          timeout 10 bash -c "echo > /dev/tcp/$PROXY_HOST/$PROXY_PORT" 2>&1 && echo "PUERTO $PROXY_PORT ABIERTO" || { echo "ERROR: PUERTO $PROXY_PORT CERRADO O INALCANZABLE. Deteniendo workflow."; exit 1; }

          echo ""
          echo "=== Probando conexion via proxy ==="
          # Mostrar longitudes de todos los secrets para detectar espacios extra
          PU="${{ secrets.PROXY_USER }}"
          PP="${{ secrets.PROXY_PASS }}"
          TU="${{ secrets.TMS_URL }}"
          echo "PROXY_USER length: ${#PU}"
          echo "PROXY_PASS length: ${#PP}"
          echo "TMS_URL length: ${#TU}"
          echo "TMS_URL first 10 chars: ${TU:0:10}"

          # Intentar curl con verbose para ver el error
          curl -v --max-time 30 -x "http://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:${{ secrets.PROXY_PORT }}" "${{ secrets.TMS_URL }}" 2>&1 | tail -20
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 -x "http://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:${{ secrets.PROXY_PORT }}" "${{ secrets.TMS_URL }}")
          echo "Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
            echo "ERROR: Proxy no responde (HTTP $HTTP_CODE). Deteniendo workflow."
            exit 1
          fi
          echo "Proxy OK - conexion exitosa"

      - name: Crear archivo de configuración
        run: |
          cat > "Bot 001/config_tms.json" << 'EOF'
          {
              "tms": {
                  "url": "${{ secrets.TMS_URL }}",
                  "usuario": "${{ secrets.TMS_USUARIO }}",
                  "clave": "${{ secrets.TMS_CLAVE }}"
              },
              "descarga": {
                  "carpeta_destino": "/tmp/tms_downloads",
                  "prefijo_archivo": "informe_general"
              },
              "postgresql": {
                  "host": "${{ secrets.PG_HOST }}",
                  "port": "${{ secrets.PG_PORT }}",
                  "database": "${{ secrets.PG_DATABASE }}",
                  "usuario": "${{ secrets.PG_USUARIO }}",
                  "clave": "${{ secrets.PG_CLAVE }}"
              }
          }
          EOF
          echo "Verificando config..."
          cat "Bot 001/config_tms.json" | python -c "import sys,json; c=json.load(sys.stdin); print(f'PG host={c[\"postgresql\"][\"host\"]} port={c[\"postgresql\"][\"port\"]}')"

      - name: Ejecutar Bot 001
        run: |
          mkdir -p /tmp/tms_downloads
          cd "Bot 001"
          python descargar_reporte_tms.py
        env:
          HEADLESS: "true"
          PROXY_EXTENSION: "/tmp/proxy_auth"

      - name: Subir artefactos (CSV, screenshots, HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-bot
          path: /tmp/tms_downloads/
          retention-days: 7
