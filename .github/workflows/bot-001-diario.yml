name: Bot 001 - Informe General TMS Diario

on:
  schedule:
    # Corre a las 07:05 PM UTC = 2:05 AM hora Colombia (UTC-5)
    - cron: '05 07 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  descargar-informe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Instalar dependencias
        run: |
          pip install selenium psycopg2-binary pandas

      - name: Preparar secrets limpios
        run: |
          # Limpiar espacios/saltos de linea de todos los secrets
          echo "PROXY_HOST=$(echo '${{ secrets.PROXY_HOST }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PROXY_PORT=$(echo '${{ secrets.PROXY_PORT }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PROXY_USER=$(echo '${{ secrets.PROXY_USER }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PROXY_PASS=$(echo '${{ secrets.PROXY_PASS }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "TMS_URL=$(echo '${{ secrets.TMS_URL }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "TMS_USUARIO=$(echo '${{ secrets.TMS_USUARIO }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "TMS_CLAVE=$(echo '${{ secrets.TMS_CLAVE }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PG_HOST=$(echo '${{ secrets.PG_HOST }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PG_PORT=$(echo '${{ secrets.PG_PORT }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PG_DATABASE=$(echo '${{ secrets.PG_DATABASE }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PG_USUARIO=$(echo '${{ secrets.PG_USUARIO }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "PG_CLAVE=$(echo '${{ secrets.PG_CLAVE }}' | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Crear proxy local forwarder
        run: |
          cat > /tmp/proxy_forwarder.py << 'PYEOF'
          import socket, threading, base64, sys, os

          PROXY_HOST = os.environ.get("PROXY_HOST", "")
          PROXY_PORT = int(os.environ.get("PROXY_PORT", "3128"))
          PROXY_USER = os.environ.get("PROXY_USER", "")
          PROXY_PASS = os.environ.get("PROXY_PASS", "")
          AUTH = base64.b64encode(f'{PROXY_USER}:{PROXY_PASS}'.encode()).decode()
          LOCAL_PORT = 8888

          def forward(src, dst):
              try:
                  while True:
                      data = src.recv(65536)
                      if not data: break
                      dst.sendall(data)
              except: pass
              finally: src.close(); dst.close()

          def handle(client):
              try:
                  req = b''
                  while b'\r\n\r\n' not in req:
                      chunk = client.recv(4096)
                      if not chunk: return
                      req += chunk
                  target = req.decode(errors='replace').split('\r\n')[0].split(' ')[1]
                  proxy = socket.socket()
                  proxy.settimeout(120)
                  proxy.connect((PROXY_HOST, PROXY_PORT))
                  proxy.sendall(f"CONNECT {target} HTTP/1.1\r\nHost: {target}\r\nProxy-Authorization: Basic {AUTH}\r\n\r\n".encode())
                  resp = b''
                  while b'\r\n\r\n' not in resp:
                      chunk = proxy.recv(4096)
                      if not chunk: return
                      resp += chunk
                  if b'200' in resp.split(b'\r\n')[0]:
                      client.sendall(b'HTTP/1.1 200 Connection established\r\n\r\n')
                      t1 = threading.Thread(target=forward, args=(client, proxy), daemon=True)
                      t2 = threading.Thread(target=forward, args=(proxy, client), daemon=True)
                      t1.start(); t2.start(); t1.join()
                  else:
                      client.sendall(resp); client.close(); proxy.close()
              except Exception as e:
                  print(f"Error: {e}")

          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(('127.0.0.1', LOCAL_PORT))
          server.listen(50)
          print(f"Proxy local en 127.0.0.1:{LOCAL_PORT}")
          sys.stdout.flush()
          while True:
              client, _ = server.accept()
              threading.Thread(target=handle, args=(client,), daemon=True).start()
          PYEOF
          # Iniciar proxy en background
          python /tmp/proxy_forwarder.py &
          sleep 2
          # Verificar
          curl -s -o /dev/null -w "Proxy local status: %{http_code}" --max-time 15 -x http://localhost:8888 "${TMS_URL}"

      - name: Diagnosticar proxy
        run: |
          echo "=== Diagnostico de Proxy ==="
          echo "PROXY_HOST length: ${#PROXY_HOST}"
          echo "PROXY_HOST first 4 chars: ${PROXY_HOST:0:4}"
          echo "PROXY_HOST last 4 chars: ${PROXY_HOST: -4}"
          echo "PROXY_PORT: ${PROXY_PORT}"
          echo "TMS_URL length: ${#TMS_URL}"
          echo "PROXY_HOST is empty: $([ -z "$PROXY_HOST" ] && echo 'YES - EMPTY!' || echo 'No')"

          # Validar que PROXY_HOST no este vacio
          if [ -z "$PROXY_HOST" ]; then
            echo "ERROR: PROXY_HOST esta vacio. Deteniendo workflow."
            exit 1
          fi

          echo ""
          echo "=== Probando conexion al puerto del proxy ==="
          timeout 10 bash -c "echo > /dev/tcp/$PROXY_HOST/$PROXY_PORT" 2>&1 && echo "PUERTO $PROXY_PORT ABIERTO" || { echo "ERROR: PUERTO $PROXY_PORT CERRADO O INALCANZABLE. Deteniendo workflow."; exit 1; }

          echo ""
          echo "=== Probando conexion via proxy ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 -x "http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}" "${TMS_URL}")
          echo "Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
            echo "ERROR: Proxy no responde (HTTP $HTTP_CODE). Deteniendo workflow."
            exit 1
          fi
          echo "Proxy OK - conexion exitosa"

      - name: Crear archivo de configuración
        run: |
          cat > "Bot 001/config_tms.json" << EOF
          {
              "tms": {
                  "url": "${TMS_URL}",
                  "usuario": "${TMS_USUARIO}",
                  "clave": "${TMS_CLAVE}"
              },
              "descarga": {
                  "carpeta_destino": "/tmp/tms_downloads",
                  "prefijo_archivo": "informe_general"
              },
              "postgresql": {
                  "host": "${PG_HOST}",
                  "port": "${PG_PORT}",
                  "database": "${PG_DATABASE}",
                  "usuario": "${PG_USUARIO}",
                  "clave": "${PG_CLAVE}"
              }
          }
          EOF
          echo "Verificando config..."
          cat "Bot 001/config_tms.json" | python -c "import sys,json; c=json.load(sys.stdin); print(f'PG host={c[\"postgresql\"][\"host\"]} port={c[\"postgresql\"][\"port\"]}')"

      - name: Ejecutar Bot 001
        run: |
          mkdir -p /tmp/tms_downloads
          cd "Bot 001"
          python descargar_reporte_tms.py
        env:
          HEADLESS: "true"
          PROXY_LOCAL: "http://localhost:8888"
          EXCLUIR_CLIENTES: "${{ secrets.EXCLUIR_CLIENTES }}"

      - name: Subir artefactos (CSV, screenshots, HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-bot
          path: /tmp/tms_downloads/
          retention-days: 7
